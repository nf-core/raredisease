custom_logo: "nf-core-raredisease_logo_light.png"
custom_logo_url: https://github.com/nf-core/raredisease/
custom_logo_title: "nf-core/raredisease"
report_comment: >
  This report has been generated by the <a href="https://github.com/nf-core/raredisease/tree/dev" target="_blank">nf-core/raredisease</a> analysis pipeline. For information about how to interpret these results, please see the <a href="https://nf-co.re/raredisease/dev/docs/output" target="_blank">documentation</a>.

report_section_order:
  "nf-core-raredisease-methods-description":
    order: -1000
  software_versions:
    order: -1001
  "nf-core-raredisease-summary":
    order: -1002
  gatk_contamination:
    order: 1050
export_plots: true
run_modules:
  - fastqc
  - fastp
  - picard
  - mosdepth
  - ngsbits
  - peddy
  - verifybamid
  - custom_content
module_order:
  - fastqc:
      name: "FastQC"
      path_filters:
        - "*.zip"
  - picard:
      name: "Picard"
  - fastp:
      name: "fastp"
  - mosdepth:
      name: "Mosdepth"
  - ngsbits:
      name: "ngsbits"
  - peddy:
      name: "Peddy"
  - verifybamid:
      name: "VerifyBamID2"

# Custom content configuration for GATK contamination
custom_data:
  gatk_contamination:
    id: "gatk_contamination"
    section_name: "GATK Contamination"
    description: "Sample contamination estimates from GATK CalculateContamination based on common variant allele frequencies"
    plot_type: "generalstats"
    pconfig:
      contamination_pct:
        title: "Contamination"
        description: "Estimated sample contamination percentage"
        max: 10
        min: 0
        scale: "RdYlGn-rev"
        suffix: "%"
        format: "{:,.2f}"
        shared_key: "contamination"

# Make contamination visible in general stats by default
table_columns_visible:
  gatk_contamination:
    contamination_pct: true

# Color coding thresholds for contamination
table_cond_formatting_rules:
  contamination_pct:
    pass:
      - s_eq: "pass"
      - lt: 2.0
    warn:
      - s_eq: "warn"
      - lt: 5.0
      - gte: 2.0
    fail:
      - s_eq: "fail"
      - gte: 5.0

# Add to General Statistics table configuration
table_columns_placement:
  gatk_contamination:
    contamination_pct: 900

extra_fn_clean_exts:
  - "_sorted_md"
  - "_contamination"
  - "_pileups"
  - "_mosdepth"
  - "_sorted"
  - type: regex
    pattern: "_LNUMBER[0-9]{1,}"

table_sample_merge:
  "(R1)": "_1"
  "(R2)": "_2"

disable_version_detection: true
